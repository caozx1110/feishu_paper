# @package _global_
#
# 个人配置文件模板 - 新用户配置指南
# 复制此文件并根据您的需求进行修改
#
# 配置文件命名规则：
# - sync_[研究领域].yaml: 用于自动同步的配置文件
# - test_[功能].yaml: 用于测试的配置文件
# - [自定义名称].yaml: 其他用途的配置文件

defaults:
  - default # 继承默认配置
  - _self_ # 当前配置优先级最高

# ================================
# 用户信息配置
# ================================
user_profile:
  name: "VLN研究员" # 显示在飞书表格中的用户名
  description: "专注于视觉语言导航技术研究" # 详细的研究方向说明
  research_area: "vision_language_navigation" # 研究领域标识符（用于文件名等）

# ================================
# 飞书同步配置
# ================================
feishu:
  enabled: true # 是否启用飞书同步 (true/false)
  batch_size: 50 # 每批次同步的论文数量 (建议10-50)
  sync_threshold: 0.5 # 同步阈值，高于此分数的论文才会同步

# ================================
# 论文搜索配置
# ================================
search:
  field:
    "robotics" # 搜索领域: ai, robotics, cv, nlp, all 等，支持以下格式：
    # 单个: "ai", "robotics", "cv", "nlp"
    # 并集: "ai+robotics", "ai|cv", "ai or nlp"
    # 交集: "ai&robotics" (注意：ArXiv API限制，实际为并集)
    # 直接分类: "cs.AI", ["cs.AI", "cs.LG"]
    # 可用领域: all, ai, robotics, cv, nlp, physics, math, stat, eess, q-bio
  days: 3 # 搜索最近N天的论文 (1-365， 每日更新可设为2-5)
  max_results: 500 # 最大获取论文数量 (建议300-10000，取决于你的搜索领域)
  min_score: 0.5 # 最小相关性评分 (0.0-1.0)

  date_range:
    enabled: false # 是否启用精确日期范围搜索，可用于大量检索，不适用于每日更新
    start_date: "2025-09-01" # 开始日期 (YYYY-MM-DD)
    end_date: "2025-11-05" # 结束日期 (YYYY-MM-DD)

# 必须包含关键词配置
required_keywords:
  enabled: true # 启用必须包含关键词过滤
  fuzzy_match: true # 启用模糊匹配
  similarity_threshold: 0.8 # 模糊匹配相似度阈值
  keywords: # 必须包含的关键词列表，论文必须同时包含所有项
    - "robust navigation OR vision-and-language navigation OR VLN OR object navigation OR vision language navigation"
    - "zero-shot OR graph OR map-free OR SLAM OR semantic SLAM OR VLA OR foundation model OR memory"

# ================================
# 关键词配置
# ================================
interest_keywords:
  # 高权重关键词 - 最重要的研究术语
  - "# 🎯 高权重核心关键词"
  - "vision-and-language navigation"
  - "VLN"
  - "language-guided navigation"
  - "vision language action"
  - "VLA"
  - "vision-language-action"
  - "graph-based navigation"
  - "zero-shot navigation"

  # 中权重关键词 - 相关领域术语
  - "# 🤖 中权重相关关键词"
  - "scene graph"
  - "spatial graph"
  - "relational reasoning"
  - "memory graph"
  - "zero-shot generalization"

  # 低权重关键词 - 技术方法术语
  - "# 🔧 低权重技术关键词"
  - "reinforcement learning"
  - "imitation learning"
  - "cross-modal alignment"
  - "spatial reasoning"
  - "trajectory prediction"
  - "goal-conditioned policy"
  - "attention mechanism"
  - "transformer"
  - "memory network"
  - "hierarchical planning"
  - "semantic SLAM"

exclude_keywords:
  # 排除不相关的研究领域
  - "medical"
  - "clinical"
  - "pharmaceutical"
  - "biological"
  - "healthcare"
  - "drug discovery"
  - "object detection only"
  - "generation only"

description: VLN（Vision-and-Language Navigation）领域专用配置文件，聚焦于具身智能中的导航任务 [精炼关键词结构，核心优先]
